<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jae HQ | Blog</title>

  <link rel="stylesheet" href="Css/style.css">
</head>

<body>

    <!-- 🌐 Navigation -->
     <nav>
        <div class="nav-left">
            <a href="index.html">Home</a>
            <a href="books.html">Books</a>
            <a href="blog.html">Blog</a>
            <a href="youtube.html">YouTube</a>
            <a href="travel.html">Travel</a>
            <a href="social.html">Socials</a>
        </div>

        <div class="nav-right">
            <div class="auth-text" id="authMessage">
                Join the journey ✨
            </div>
            <div class="profile-area">
                <a href="login.html"
                   class="profile-button"
                   id="profileButton">👤</a>
                <div class="profile-dropdown" id="profileDropdown">
                    <p id="membershipText">
                        Membership: Dreamer
                    </p>
                    <button onclick="resetPassword()">
                        Reset Password
                    </button>
                    <button onclick="logout()">
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- 🦋 Ambient decoration (keep minimal, not spammy) -->
    <div class="ambient">
        <span class="butterfly">🦋</span>
        <span class="butterfly">🦋</span>
    </div>

    <!-- 📌 Page Header -->
    <header class="page-header">
        <h1>Blog</h1>
        <p>Thoughts, experiments, and stories from Jae HQ.</p>
    </header>

    <!-- 🔎 Controls -->
    <section class="controls">

        <input 
            type="text"
            id="searchInput"
            placeholder="Search posts..."
            onkeyup="searchPosts()"
            autocomplete="off"
        >

        <div class="filter-bar">
            <button onclick="filterPosts('all')">All</button>
            <button onclick="filterPosts('life')">Life</button>
            <button onclick="filterPosts('travel')">Travel</button>
        </div>

    </section>

    <!-- 🧠 Blog Content -->
    <main class="blog-container" id="blogContainer">
        <!-- JS injects posts here -->
    </main>

    <!-- ⚙️ Scripts -->
    <script src="posts.js" defer></script>
    <script src="blog.js" defer></script>
    <script type="module" src="auth.js"></script>

</body>
</html>
