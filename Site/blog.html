<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jae HQ | Blog</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- 🌐 Navigation -->
    <nav class="nav">
        <a href="index.html">Home</a>
        <a href="books.html">Books</a>
        <a href="blog.html" class="active">Blog</a>
        <a href="youtube.html">YouTube</a>
        <a href="travel.html">Travel</a>
        <a href="social.html">Socials</a>
    </nav>

    <!-- 🦋 Ambient decoration (keep minimal, not spammy) -->
    <div class="ambient">
        <span class="butterfly">🦋</span>
        <span class="butterfly">🦋</span>
    </div>

    <!-- 📌 Page Header -->
    <header class="page-header">
        <h1>Blog</h1>
        <p>Thoughts, experiments, and stories from Jae HQ.</p>
    </header>

    <!-- 🔎 Controls -->
    <section class="controls">

        <input 
            type="text"
            id="searchInput"
            placeholder="Search posts..."
            onkeyup="searchPosts()"
            autocomplete="off"
        >

        <div class="filter-bar">
            <button onclick="filterPosts('all')">All</button>
            <button onclick="filterPosts('life')">Life</button>
            <button onclick="filterPosts('travel')">Travel</button>
        </div>

    </section>

    <!-- 🧠 Blog Content -->
    <main class="blog-container" id="blogContainer">
        <!-- JS injects posts here -->
    </main>

    <!-- ⚙️ Scripts -->
    <script src="posts.js" defer></script>
    <script src="blog.js" defer></script>
    <script type="module" src="auth.js"></script>

</body>
</html>
