<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Create Account | Jae HQ</title>

    <link rel="stylesheet" href="Css/style.css">

</head>

<body>


    <!-- ========================= -->
    <!-- FLOATING BUTTERFLIES -->
    <!-- ========================= -->

    <div class="butterfly">🦋</div>
    <div class="butterfly">🦋</div>


    <!-- ========================= -->
    <!-- AUTH CONTAINER -->
    <!-- ========================= -->

    <section class="auth-page">

        <div class="auth-card">


            <!-- HEADER -->

            <h1>Create Identity</h1>

            <p class="auth-subtext">
                Enter the neon network and begin your journey ✨
            </p>


            <!-- FORM -->

            <div class="auth-form">

                <input type="text"
                       id="signupUsername"
                       placeholder="Username">


                <input type="email"
                       id="signupEmail"
                       placeholder="Email Address">


                <input type="password"
                       id="signupPassword"
                       placeholder="Password">


                <!-- ========================= -->
                <!-- EMOJI PICKER -->
                <!-- ========================= -->

                <h3>Choose Your Butterfly Identity</h3>

                <div class="emoji-picker">

                    <span onclick="selectEmoji('🦋')">🦋</span>
                    <span onclick="selectEmoji('🌸')">🌸</span>
                    <span onclick="selectEmoji('🌙')">🌙</span>
                    <span onclick="selectEmoji('⭐')">⭐</span>
                    <span onclick="selectEmoji('🧸')">🧸</span>
                    <span onclick="selectEmoji('☁️')">☁️</span>
                    <span onclick="selectEmoji('🍄')">🍄</span>
                    <span onclick="selectEmoji('🐇')">🐇</span>

                </div>


                <p id="selectedEmoji"
                   class="selected-emoji">

                    Selected: 🦋

                </p>


                <!-- BUTTON -->

                <button onclick="signup()">

                    Create Account

                </button>


                <!-- LOGIN LINK -->

                <p class="auth-link">

                    Already connected?

                    <a href="login.html">

                        Log In

                    </a>

                </p>

            </div>

        </div>

    </section>



    <!-- ========================= -->
    <!-- SCRIPTS -->
    <!-- ========================= -->

    <script type="module" src="firebase.js"></script>

    <script type="module" src="auth.js"></script>


</body>

</html>
