<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Jae HQ | Blog Post</title>

   <link rel="stylesheet" href="Css/style.css">

</head>

<body>

    <!-- =========================================
         NAVIGATION
    ========================================== -->

    <nav>

        <div class="nav-left">

            <a href="index.html">Home</a>

            <a href="blog.html" class="active">Blog</a>

        </div>

    </nav>


    <!-- =========================================
         FLOATING BUTTERFLIES
    ========================================== -->

    <div class="butterfly">🦋</div>
    <div class="butterfly">🦋</div>


    <!-- =========================================
         BLOG POST
    ========================================== -->

    <main>

        <section class="post-wrapper">

            <div id="post-content" class="post-content"></div>

        </section>


        <!-- =========================================
             COMMENTS SECTION
        ========================================== -->

        <section id="comments-section">

            <div class="page-header">

                <h2>Comments</h2>

                <p>
                    Share your thoughts with the Jae HQ community.
                </p>

            </div>

            <div id="comments-list"></div>


            <!-- COMMENT INPUT -->

            <div class="comment-form">

                <textarea
                    id="commentInput"
                    placeholder="Write a comment...">
                </textarea>

                <button onclick="addComment()">
                    Post Comment
                </button>

                <p id="login-warning"></p>

            </div>

        </section>

    </main>


    <!-- =========================================
         POSTS SCRIPT
    ========================================== -->

    <script src="posts.js"></script>


    <!-- =========================================
         LOAD BLOG POST
    ========================================== -->

    <script>

        const index = localStorage.getItem("selectedPost");

        const post = posts[index];

        const container =
            document.getElementById("post-content");

        container.innerHTML = `

            <div class="blog-post-card">

                <h1>${post.title}</h1>

                <p class="date">
                    ${post.date}
                </p>

                <p class="tags">
                    #${post.tags.join(" #")}
                </p>

                <img src="${post.image}"
                     alt="${post.title}">

                <p class="post-text">
                    ${post.content}
                </p>

            </div>

        `;

    </script>


    <!-- =========================================
         COMMENTS SYSTEM
    ========================================== -->

    <script>

        const user =
            localStorage.getItem("loggedInUser");

        if (!user) {

            document.getElementById(
                "login-warning"
            ).innerHTML =
            "You must be logged in to comment.";

        }


        /* ================================
           LOAD COMMENTS
        ================================= */

        function loadComments() {

            const postIndex =
                localStorage.getItem("selectedPost");

            const comments =
                JSON.parse(
                    localStorage.getItem(
                        "comments_" + postIndex
                    )
                ) || [];

            const currentUser =
                localStorage.getItem("loggedInUser");

            const commentsList =
                document.getElementById(
                    "comments-list"
                );

            commentsList.innerHTML = "";

            comments.forEach((comment, index) => {

                const commentDiv =
                    document.createElement("div");

                commentDiv.classList.add("comment");

                commentDiv.innerHTML = `

                    <strong>
                        ${comment.username}
                    </strong>

                    <p>
                        ${comment.text}
                    </p>

                    <small>
                        ${comment.time}
                    </small>

                `;


                /* DELETE BUTTON */

                if (
                    comment.username === currentUser
                ) {

                    const deleteBtn =
                        document.createElement("button");

                    deleteBtn.textContent = "Delete";

                    deleteBtn.onclick = function () {

                        deleteComment(index);

                    };

                    commentDiv.appendChild(
                        document.createElement("br")
                    );

                    commentDiv.appendChild(deleteBtn);

                }

                commentsList.appendChild(commentDiv);

            });

        }


        /* ================================
           ADD COMMENT
        ================================= */

        function addComment() {

            const input =
                document.getElementById("commentInput");

            const index =
                localStorage.getItem("selectedPost");

            const user =
                localStorage.getItem("loggedInUser");

            if (!user) {

                alert(
                    "You must be logged in to comment!"
                );

                return;

            }

            if (input.value.trim() === "") {

                alert("Comment cannot be empty!");

                return;

            }

            let comments =
                JSON.parse(
                    localStorage.getItem(
                        "comments_" + index
                    )
                ) || [];

            const newComment = {

                username: user,

                text: input.value,

                time: new Date().toLocaleString()

            };

            comments.push(newComment);

            localStorage.setItem(
                "comments_" + index,
                JSON.stringify(comments)
            );

            input.value = "";

            loadComments();

        }


        /* ================================
           DELETE COMMENT
        ================================= */

        function deleteComment(indexToDelete) {

            const index =
                localStorage.getItem("selectedPost");

            let comments =
                JSON.parse(
                    localStorage.getItem(
                        "comments_" + index
                    )
                ) || [];

            comments.splice(indexToDelete, 1);

            localStorage.setItem(
                "comments_" + index,
                JSON.stringify(comments)
            );

            loadComments();

        }


        /* ================================
           INITIAL LOAD
        ================================= */

        loadComments();

    </script>


    <!-- =========================================
         AUTH SCRIPT
    ========================================== -->

    <script type="module" src="auth.js"></script>

</body>

</html>
